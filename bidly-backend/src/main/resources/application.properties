spring.application.name=bidly-backend

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
server.port=${PORT:8083}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.error.include-message=always
server.error.include-binding-errors=always
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=50MB

# Brevo API — configurar en Railway: BREVO_API_KEY, BREVO_FROM_EMAIL
brevo.api.key=${BREVO_API_KEY:}
bidly.mail.from=${BREVO_FROM_EMAIL:noreply@bidly.com}
